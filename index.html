<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft Mods Pro - Virtual Piano</title>
    <style>
        /* تصميم اللوحة الخلفية والألوان النيون */
        .piano-container {
            background: #111424;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 20px rgba(0, 229, 255, 0.2);
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            direction: ltr;
        }

        .piano-title {
            color: #00e5ff;
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .piano-subtitle {
            color: #8b9bb4;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* لوحة المفاتيح */
        .piano-keyboard {
            display: flex;
            justify-content: center;
            position: relative;
            background: #090b14;
            padding: 20px 10px;
            border-radius: 10px;
            box-shadow: inset 0 0 10px #000;
        }

        /* المفاتيح البيضاء */
        .key-white {
            width: 60px;
            height: 220px;
            background: linear-gradient(to bottom, #fff 0%, #e0e0e0 100%);
            border: 1px solid #111;
            border-radius: 0 0 7px 7px;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15px;
            box-sizing: border-box;
            transition: all 0.1s ease;
            z-index: 1;
        }

        .key-white:active, .key-white.active {
            background: linear-gradient(to bottom, #00e5ff 0%, #00a5bb 100%);
            box-shadow: 0 0 15px #00e5ff;
            height: 218px;
            transform: translateY(2px);
        }

        /* المفاتيح السوداء */
        .key-black {
            width: 36px;
            height: 130px;
            background: linear-gradient(to bottom, #333 0%, #000 100%);
            border: 1px solid #000;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            margin-left: -18px;
            margin-right: -18px;
            z-index: 2;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10px;
            box-sizing: border-box;
            transition: all 0.1s ease;
            box-shadow: 0 5px 5px rgba(0,0,0,0.5);
        }

        .key-black:active, .key-black.active {
            background: linear-gradient(to bottom, #ff007f 0%, #b5005a 100%);
            box-shadow: 0 0 15px #ff007f;
            height: 128px;
        }

        /* أحرف الكيبورد المكتوبة على المفاتيح */
        .key-letter {
            font-weight: bold;
            font-size: 14px;
            pointer-events: none;
            user-select: none;
        }
        .key-white .key-letter { color: #333; }
        .key-black .key-letter { color: #fff; }
        .key-white.active .key-letter { color: #fff; }

        /* تلميح تشغيل الصوت */
        .piano-hints {
            margin-top: 20px;
            color: #8b9bb4;
            font-size: 13px;
        }
        .piano-hints span {
            color: #ff007f;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="piano-container">
    <div class="piano-title">Craft Mods Pro Piano</div>
    <div class="piano-subtitle">تأكد من تحويل لغة الكيبورد إلى الإنجليزية وابدأ العزف!</div>
    
    <div class="piano-keyboard">
        <!-- مفاتيح البيانو مرتبطة بأحرف الكيبورد ونوتات حقيقية مجانية -->
        <div class="key-white" data-key="a" data-note="C4"><span class="key-letter">A</span></div>
        <div class="key-black" data-key="w" data-note="Db4"><span class="key-letter">W</span></div>
        <div class="key-white" data-key="s" data-note="D4"><span class="key-letter">S</span></div>
        <div class="key-black" data-key="e" data-note="Eb4"><span class="key-letter">E</span></div>
        <div class="key-white" data-key="d" data-note="E4"><span class="key-letter">D</span></div>
        <div class="key-white" data-key="f" data-note="F4"><span class="key-letter">F</span></div>
        <div class="key-black" data-key="t" data-note="Gb4"><span class="key-letter">T</span></div>
        <div class="key-white" data-key="g" data-note="G4"><span class="key-letter">G</span></div>
        <div class="key-black" data-key="y" data-note="Ab4"><span class="key-letter">Y</span></div>
        <div class="key-white" data-key="h" data-note="A4"><span class="key-letter">H</span></div>
        <div class="key-black" data-key="u" data-note="Bb4"><span class="key-letter">U</span></div>
        <div class="key-white" data-key="j" data-note="B4"><span class="key-letter">J</span></div>
        <div class="key-white" data-key="k" data-note="C5"><span class="key-letter">K</span></div>
    </div>

    <div class="piano-hints">
        جرب الضغط المتتالي على: <span>A S D F F G H J K</span> لتسمع تصاعد النغمات!
    </div>
</div>

<script>
    // استخدام توليد أصوات حقيقية الكترونياً (Synth) لكي لا تحتاج لتنزيل ملفات صوتية وتصبح اللعبة خفيفة جداً في موقعك
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // ترددات النوتات الموسيقية الحقيقية
    const noteFrequencies = {
        "C4": 261.63, "Db4": 277.18, "D4": 293.66, "Eb4": 311.13, 
        "E4": 329.63, "F4": 349.23, "Gb4": 369.99, "G4": 392.00, 
        "Ab4": 415.30, "A4": 440.00, "Bb4": 466.16, "B4": 493.88, "C5": 523.25
    };

    function playNote(frequency) {
        if (!frequency) return;
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'triangle'; // نوع الموجة الصوتية يعطي صوت ناعم مثل البيانو الحقيقي
        oscillator.frequency.value = frequency;
        
        // تلاشي الصوت تدريجياً ليعطي إحساس البيانو الطبيعي
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.8);
    }

    // تشغيل الصوت عند الضغط بالماوس
    const keys = document.querySelectorAll('.piano-keyboard > div');
    keys.forEach(key => {
        key.addEventListener('mousedown', () => {
            const note = key.getAttribute('data-note');
            playNote(noteFrequencies[note]);
        });
    });

    // تشغيل الصوت عند الضغط بأزرار الكيبورد
    window.addEventListener('keydown', (e) => {
        if (e.repeat) return; // منع تكرار الصوت عند تعليق الضغط على الزر
        const keyName = e.key.toLowerCase();
        const targetKey = document.querySelector(`[data-key="${keyName}"]`);
        
        if (targetKey) {
            targetKey.classList.add('active');
            const note = targetKey.getAttribute('data-note');
            playNote(noteFrequencies[note]);
        }
    });

    // إزالة اللون عند رفع الإصبع عن الكيبورد
    window.addEventListener('keyup', (e) => {
        const keyName = e.key.toLowerCase();
        const targetKey = document.querySelector(`[data-key="${keyName}"]`);
        if (targetKey) {
            targetKey.classList.remove('active');
        }
    });
</script>

</body>
</html>
