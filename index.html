<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft Mods Pro - Luxury Cyber Piano</title>
    <style>
        /* تصميم الخلفية الفاخرة والمظلمة للموقع */
        body {
            background-color: #05070f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* الحاوية الرئيسية - لوحة تحكم فاخرة ثلاثية الأبعاد */
        .piano-container {
            background: linear-gradient(135deg, rgba(15, 22, 42, 0.95) 0%, rgba(6, 10, 23, 0.98) 100%);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(0, 229, 255, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 229, 255, 0.3);
            text-align: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            width: 100%;
            max-width: 1050px;
            box-sizing: border-box;
            position: relative;
        }

        /* شاشة العرض العلوية للمؤثرات الشعاعية */
        .visualizer-screen {
            height: 80px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 229, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 20px;
            overflow: hidden;
        }

        .visual-bar {
            width: 6px;
            height: 10%;
            background: linear-gradient(to top, #00e5ff, #ff007f);
            border-radius: 3px 3px 0 0;
            transition: height 0.1s ease;
            opacity: 0.3;
        }

        .visual-bar.pulse {
            height: 90% !important;
            opacity: 1;
            box-shadow: 0 0 15px #00e5ff, 0 0 25px #ff007f;
        }

        .piano-title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        .piano-subtitle {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* لوحة تشغيل المفاتيح */
        .piano-keyboard {
            display: flex;
            justify-content: center;
            background: #020408;
            padding: 25px 15px;
            border-radius: 16px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            position: relative;
        }

        /* المفاتيح البيضاء الفاخرة */
        .key-white {
            width: 55px;
            height: 240px;
            background: linear-gradient(to bottom, #ffffff 0%, #f1f5f9 80%, #cbd5e1 100%);
            border: 1px solid #0f172a;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
            box-sizing: border-box;
            transition: filter 0.1s, transform 0.05s, background 0.1s;
            z-index: 1;
            box-shadow: 0 5px 5px rgba(0,0,0,0.3);
        }

        .key-white:active, .key-white.active {
            background: linear-gradient(to bottom, #00f2fe 0%, #4facfe 100%);
            box-shadow: 0 0 25px #00e5ff, inset 0 -5px 15px rgba(255,255,255,0.4);
            transform: translateY(4px);
            height: 236px;
        }

        /* المفاتيح السوداء الفخمة */
        .key-black {
            width: 34px;
            height: 145px;
            background: linear-gradient(to bottom, #1e293b 0%, #020617 100%);
            border: 1px solid #000;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            margin-left: -17px;
            margin-right: -17px;
            z-index: 2;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 12px;
            box-sizing: border-box;
            transition: transform 0.05s, background 0.1s;
            box-shadow: 0 8px 10px rgba(0,0,0,0.6);
        }

        .key-black:active, .key-black.active {
            background: linear-gradient(to bottom, #ff0844 0%, #ffb199 100%);
            box-shadow: 0 0 25px #ff007f, inset 0 -3px 10px rgba(255,255,255,0.4);
            transform: translateY(3px);
            height: 142px;
        }

        /* الحروف المضيئة */
        .key-letter {
            font-weight: 700;
            font-size: 13px;
            pointer-events: none;
            user-select: none;
            font-family: monospace;
        }
        .key-white .key-letter { color: #475569; }
        .key-black .key-letter { color: #94a3b8; }
        .key-white.active .key-letter, .key-black.active .key-letter { color: #ffffff; text-shadow: 0 0 5px #fff; }

        .piano-hints {
            margin-top: 25px;
            color: #475569;
            font-size: 13px;
        }
        .piano-hints span {
            color: #00e5ff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,229,255,0.3);
        }
    </style>
</head>
<body>

<div class="piano-container">
    <div class="visualizer-screen" id="screen">
        </div>

    <div class="piano-title">Craft Mods Pro</div>
    <div class="piano-subtitle">Luxury Edition • 20 Keys Keyboard Studio</div>
    
    <div class="piano-keyboard">
        <div class="key-white" data-key="a" data-note="C4" data-bar="0"><span class="key-letter">A</span></div>
        <div class="key-black" data-key="w" data-note="Db4" data-bar="1"><span class="key-letter">W</span></div>
        <div class="key-white" data-key="s" data-note="D4" data-bar="2"><span class="key-letter">S</span></div>
        <div class="key-black" data-key="e" data-note="Eb4" data-bar="3"><span class="key-letter">E</span></div>
        <div class="key-white" data-key="d" data-note="E4" data-bar="4"><span class="key-letter">D</span></div>
        <div class="key-white" data-key="f" data-note="F4" data-bar="5"><span class="key-letter">F</span></div>
        <div class="key-black" data-key="t" data-note="Gb4" data-bar="6"><span class="key-letter">T</span></div>
        <div class="key-white" data-key="g" data-note="G4" data-bar="7"><span class="key-letter">G</span></div>
        <div class="key-black" data-key="y" data-note="Ab4" data-bar="8"><span class="key-letter">Y</span></div>
        <div class="key-white" data-key="h" data-note="A4" data-bar="9"><span class="key-letter">H</span></div>
        <div class="key-black" data-key="u" data-note="Bb4" data-bar="10"><span class="key-letter">U</span></div>
        <div class="key-white" data-key="j" data-note="B4" data-bar="11"><span class="key-letter">J</span></div>
        <div class="key-white" data-key="k" data-note="C5" data-bar="12"><span class="key-letter">K</span></div>
        <div class="key-black" data-key="o" data-note="Db5" data-bar="13"><span class="key-letter">O</span></div>
        <div class="key-white" data-key="l" data-note="D5" data-bar="14"><span class="key-letter">L</span></div>
        <div class="key-black" data-key="p" data-note="Eb5" data-bar="15"><span class="key-letter">P</span></div>
        <div class="key-white" data-key=";" data-note="E5" data-bar="16"><span class="key-letter">;</span></div>
        <div class="key-white" data-key="z" data-note="F5" data-bar="17"><span class="key-letter">Z</span></div>
        <div class="key-black" data-key="x" data-note="Gb5" data-bar="18"><span class="key-letter">X</span></div>
        <div class="key-white" data-key="c" data-note="G5" data-bar="19"><span class="key-letter">C</span></div>
    </div>

    <div class="piano-hints">
        اضغط على المفاتيح واستمتع بتصاعد <span>أشعة النيون</span> التفاعلية في الشاشة العلوية!
    </div>
</div>

<script>
    // إنشاء شريط الأشعة البصرية ديناميكياً لتلائم الـ 20 مفتاحاً
    const screen = document.getElementById('screen');
    for (let i = 0; i < 20; i++) {
        const bar = document.createElement('div');
        bar.classList.add('visual-bar');
        bar.id = `bar-${i}`;
        screen.appendChild(bar);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // الترددات الموسيقية الدقيقة لـ 20 مفتاحاً
    const noteFrequencies = {
        "C4": 261.63, "Db4": 277.18, "D4": 293.66, "Eb4": 311.13, "E4": 329.63,
        "F4": 349.23, "Gb4": 369.99, "G4": 392.00, "Ab4": 415.30, "A4": 440.00,
        "Bb4": 466.16, "B4": 493.88, "C5": 523.25, "Db5": 554.37, "D5": 587.33,
        "Eb5": 622.25, "E5": 659.25, "F5": 698.46, "Gb5": 739.99, "G5": 783.99
    };

    function playNote(frequency, barIndex) {
        if (!frequency) return;
        
        // تفعيل شعاع النيون المتصاعد المقابل للمفتاح
        const visualBar = document.getElementById(`bar-${barIndex}`);
        if(visualBar) {
            visualBar.classList.add('pulse');
            setTimeout(() => visualBar.classList.remove('pulse'), 300);
        }

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        // تم دمج موجات لإعطاء رنين بيانو كريستالي فاخر جداً
        oscillator.type = 'sine'; 
        oscillator.frequency.value = frequency;
        
        gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 1.2);
    }

    // تفاعل الماوس
    const keys = document.querySelectorAll('.piano-keyboard > div');
    keys.forEach(key => {
        key.addEventListener('mousedown', () => {
            const note = key.getAttribute('data-note');
            const barIndex = key.getAttribute('data-bar');
            playNote(noteFrequencies[note], barIndex);
        });
    });

    // تفاعل الكيبورد
    window.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        const keyName = e.key.toLowerCase();
        const targetKey = document.querySelector(`[data-key="${keyName}"]`);
        
        if (targetKey) {
            targetKey.classList.add('active');
            const note = targetKey.getAttribute('data-note');
            const barIndex = targetKey.getAttribute('data-bar');
            playNote(noteFrequencies[note], barIndex);
        }
    });

    window.addEventListener('keyup', (e) => {
        const keyName = e.key.toLowerCase();
        const targetKey = document.querySelector(`[data-key="${keyName}"]`);
        if (targetKey) {
            targetKey.classList.remove('active');
        }
    });
</script>

</body>
</html>
